<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="glow" cx="50%" cy="55%" r="55%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.22"/>
      <stop offset="60%" stop-color="#08090d" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="#08090d"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- top label -->
  <text x="80" y="120" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="20" letter-spacing="3" fill="#34d399" font-weight="600">
    GLOWOSTAT.US — THE PERIODIC TABLE OF HTTP
  </text>

  <!-- big headline -->
  <text x="80" y="260" font-family="'Space Grotesk', ui-sans-serif, system-ui, sans-serif" font-size="92" font-weight="700" fill="#e8ecf4" letter-spacing="-2">
    Test every HTTP
  </text>
  <text x="80" y="360" font-family="'Space Grotesk', ui-sans-serif, system-ui, sans-serif" font-size="92" font-weight="700" fill="#e8ecf4" letter-spacing="-2">
    status code.
  </text>
  <text x="80" y="430" font-family="'Space Grotesk', ui-sans-serif, system-ui, sans-serif" font-size="32" font-weight="500" fill="#8694b0">
    Free · edge-served · open source
  </text>

  <!-- code chips -->
  <g font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="34" font-weight="700">
    <g transform="translate(80,500)">
      <rect width="120" height="80" rx="14" fill="#181c25"/>
      <text x="60" y="52" text-anchor="middle" fill="#34d399">200</text>
    </g>
    <g transform="translate(220,500)">
      <rect width="120" height="80" rx="14" fill="#181c25"/>
      <text x="60" y="52" text-anchor="middle" fill="#fbbf24">301</text>
    </g>
    <g transform="translate(360,500)">
      <rect width="120" height="80" rx="14" fill="#181c25"/>
      <text x="60" y="52" text-anchor="middle" fill="#fb923c">404</text>
    </g>
    <g transform="translate(500,500)">
      <rect width="120" height="80" rx="14" fill="#181c25"/>
      <text x="60" y="52" text-anchor="middle" fill="#fb923c">418</text>
    </g>
    <g transform="translate(640,500)">
      <rect width="120" height="80" rx="14" fill="#181c25"/>
      <text x="60" y="52" text-anchor="middle" fill="#fb7185">500</text>
    </g>
    <g transform="translate(780,500)">
      <rect width="120" height="80" rx="14" fill="#181c25"/>
      <text x="60" y="52" text-anchor="middle" fill="#fb7185">503</text>
    </g>
  </g>

  <!-- wordmark bottom right -->
  <g transform="translate(940,560)" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="28" font-weight="600">
    <text x="0" y="0" fill="#e8ecf4">glowo</text>
    <text x="92" y="0" fill="#34d399">stat.us</text>
  </g>
</svg>

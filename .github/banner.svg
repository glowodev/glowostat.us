<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.10"/>
      <stop offset="60%" stop-color="#08090d" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1280" height="320" fill="#08090d"/>
  <rect width="1280" height="320" fill="url(#grid)"/>
  <rect width="1280" height="320" fill="url(#glow)"/>

  <!-- Brand mark: 5 HTTP-class bars in a rounded square -->
  <g transform="translate(296, 64)">
    <rect width="192" height="192" rx="36" fill="#11141b" stroke="#1d2230" stroke-width="2"/>
    <g transform="translate(28, 25)">
      <rect x="0" y="0"   width="136" height="22" rx="6" fill="#60a5fa"/>
      <rect x="0" y="30"  width="136" height="22" rx="6" fill="#34d399"/>
      <rect x="0" y="60"  width="136" height="22" rx="6" fill="#fbbf24"/>
      <rect x="0" y="90"  width="136" height="22" rx="6" fill="#f472b6"/>
      <rect x="0" y="120" width="136" height="22" rx="6" fill="#ef4444"/>
    </g>
  </g>

  <!-- Wordmark: glowo (light) + stat.us (emerald) -->
  <g transform="translate(528, 188)" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="68" font-weight="700" letter-spacing="-1">
    <text x="0" y="0" fill="#e8ecf4">glowo</text>
    <text x="200" y="0" fill="#34d399">stat.us</text>
  </g>
</svg>
